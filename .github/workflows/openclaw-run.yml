name: OpenClaw Prompt Runner

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'The prompt to send to OpenClaw'
        required: true
        default: 'Summarize the current state of AI agents in 3 sentences.'

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          # Fix world-writable permissions that cause gateway warnings
          sudo chmod -R o-w $(npm config get prefix)/lib/node_modules/openclaw
          openclaw --version

      - name: Run OpenClaw
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENCLAW_MODEL: "google/gemini-2.0-flash-exp"
          OPENCLAW_AGENT_MODEL: "google/gemini-2.0-flash-exp"
          OPENCLAW_SKIP_CHANNELS: "1"
          OPENCLAW_SKIP_PROVIDERS: "1"
          OPENCLAW_WORKSPACE: ${{ github.workspace }}
        run: |
          # 1. Setup workspace and config directories
          mkdir -p $OPENCLAW_WORKSPACE
          mkdir -p /home/runner/.openclaw/agents/main/agent
          
          # 2. Create minimal profile files
          echo "I am a helpful AI assistant running in a GitHub Action." > $OPENCLAW_WORKSPACE/SOUL.md
          echo "I am a developer testing OpenClaw in CI." > $OPENCLAW_WORKSPACE/USER.md

          # 3. Create global openclaw.json to force Google provider
          echo '{
            "agents": { "defaults": { "model": "google/gemini-2.0-flash-exp" } },
            "models": { "providers": { "google": { "apiKey": "'"$GEMINI_API_KEY"'" } } }
          }' > /home/runner/.openclaw/openclaw.json

          # 4. Create auth-profiles.json in both locations
          echo '{"google": {"apiKey": "'"$GEMINI_API_KEY"'"}}' > /home/runner/.openclaw/agents/main/agent/auth-profiles.json
          echo '{"google": {"apiKey": "'"$GEMINI_API_KEY"'"}}' > /home/runner/.openclaw/auth-profiles.json

          # 5. Use 'agent --local' with an explicit model override
          echo "Running OpenClaw agent locally..."
          openclaw agent --local \
            --model "google/gemini-2.0-flash-exp" \
            --session-id "ci-session-$(date +%s)" \
            --message "${{ github.event.inputs.prompt }}" > response.txt
          
          echo "--- Response Saved ---"
          cat response.txt

      - name: Upload Response Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-response
          path: response.txt
