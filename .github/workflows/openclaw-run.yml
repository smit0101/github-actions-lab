name: OpenClaw Prompt Runner

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'The prompt to send to OpenClaw'
        required: true
        default: 'Summarize the current state of AI agents in 3 sentences.'

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          # Fix world-writable permissions that cause gateway warnings
          sudo chmod -R o-w $(npm config get prefix)/lib/node_modules/openclaw
          openclaw --version

      - name: Run OpenClaw
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENCLAW_DEFAULT_PROVIDER: "google"
          OPENCLAW_MODEL: "google/gemini-1.5-flash"
          OPENCLAW_AGENT_MODEL: "google/gemini-1.5-flash"
          OPENCLAW_SKIP_CHANNELS: "1"
          OPENCLAW_SKIP_PROVIDERS: "1"
          OPENCLAW_WORKSPACE: ${{ github.workspace }}
        run: |
          # 1. Setup workspace and config directories
          mkdir -p $OPENCLAW_WORKSPACE
          mkdir -p /home/runner/.openclaw/agents/main/agent
          
          # 2. Create minimal profile files
          echo "I am a helpful AI assistant running in a GitHub Action." > $OPENCLAW_WORKSPACE/SOUL.md
          echo "I am a developer testing OpenClaw in CI." > $OPENCLAW_WORKSPACE/USER.md

          # 3. Create global openclaw.json with a more complete schema
          # Using both baseUrl and required fields
          echo '{
            "models": {
              "providers": {
                "google": {
                  "apiKey": "'"$GEMINI_API_KEY"'",
                  "baseUrl": "https://generativelanguage.googleapis.com",
                  "models": [
                    { 
                      "id": "gemini-1.5-flash",
                      "name": "Gemini 1.5 Flash"
                    }
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": "google/gemini-1.5-flash"
              }
            }
          }' > /home/runner/.openclaw/openclaw.json

          # 4. Attempt to "onboard" headless-ly to fix config
          # This might fail in some environments but it's worth a try for auto-repair
          openclaw onboard --quick-start --auth-choice google-gemini --gemini-api-key "$GEMINI_API_KEY" || echo "Onboarding skipped"

          # 5. Run the agent locally
          echo "Running OpenClaw agent locally..."
          openclaw agent --local \
            --session-id "ci-session-$(date +%s)" \
            --message "${{ github.event.inputs.prompt }}" > response.txt
          
          echo "--- Response Saved ---"
          cat response.txt

      - name: Upload Response Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-response
          path: response.txt
