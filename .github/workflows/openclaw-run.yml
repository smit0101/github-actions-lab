name: OpenClaw Prompt Runner

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'The prompt to send to OpenClaw'
        required: true
        default: 'Summarize the current state of AI agents in 3 sentences.'

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          # Fix world-writable permissions that cause gateway warnings
          sudo chmod -R o-w $(npm config get prefix)/lib/node_modules/openclaw
          openclaw --version

      - name: Run OpenClaw
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENCLAW_MODEL: "google/gemini-2.0-flash-exp"
          # Skip searching for a background gateway
          OPENCLAW_SKIP_CHANNELS: "1"
          OPENCLAW_SKIP_PROVIDERS: "1"
        run: |
          # Use 'agent --local' to run the turn directly in this process
          # This avoids the need for a background gateway.
          echo "Running OpenClaw agent locally..."
          openclaw agent --local --allow-unconfigured --message "${{ github.event.inputs.prompt }}" > response.txt
          
          echo "--- Response Saved ---"
          cat response.txt

      - name: Upload Response Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-response
          path: response.txt
